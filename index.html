<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>보험 설계서 에디터 v7.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#ebedf0;color:#333;font-size:13px;overflow-x:hidden}

/* ═══════════════════════════════════════
   TOPBAR — 데스크톱 기본
   ═══════════════════════════════════════ */
.topbar{background:#fff;border-bottom:1px solid #ddd;padding:5px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);min-height:42px}
.topbar label{font-size:11px;color:#666;white-space:nowrap;user-select:none}
.topbar select{border:1px solid #ccc;border-radius:3px;padding:4px 6px;font-size:11px;font-family:inherit;min-width:110px}
.type-badge{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;vertical-align:middle}
.type-badge.life{background:#e8f0fe;color:#1a73e8}
.type-badge.nonlife{background:#fce8e6;color:#d93025}
.tb-spacer{flex:1}
.tb-btn{border:1px solid #ccc;background:#fff;border-radius:4px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.tb-btn:hover{background:#f5f5f5}
.tb-btn:active{background:#eee}
.tb-btn[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:9px;padding:2px 6px;border-radius:2px;white-space:nowrap;z-index:200;pointer-events:none}
/* 데스크톱 전용 요소 */
.tb-desktop{display:flex;align-items:center;gap:8px}
/* 모바일 전용 요소 */
.tb-mobile{display:none}
/* 햄버거 */
.hamburger{display:none;border:1px solid #ccc;background:#fff;border-radius:4px;width:32px;height:32px;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
/* 모바일 드롭다운 메뉴 */
.mob-menu{display:none;position:absolute;top:42px;right:8px;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:150;min-width:180px;padding:4px 0}
.mob-menu.open{display:block}
.mob-menu-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;cursor:pointer;color:#333;-webkit-tap-highlight-color:transparent}
.mob-menu-item:active{background:#f0f0f0}
.mob-menu-item .mm-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.mob-menu-sep{border-top:1px solid #eee;margin:2px 0}
.mob-menu select{border:1px solid #ddd;border-radius:3px;padding:4px 6px;font-size:12px;font-family:inherit;flex:1}

/* ═══════════════════════════════════════
   LAYOUT — 데스크톱
   ═══════════════════════════════════════ */
.main{display:flex;min-height:calc(100vh - 42px)}

/* ═══ PANEL (데스크톱 사이드) ═══ */
.panel{width:270px;background:#fff;border-right:1px solid #ddd;overflow-y:auto;flex-shrink:0;font-size:12px}
.panel .sec{padding:10px 12px;border-bottom:1px solid #eee}
.panel h4{font-size:12px;color:#444;margin:0 0 6px;cursor:default}
.panel .fld{margin-bottom:7px}
.panel .fld label{display:block;font-size:10px;color:#888;margin-bottom:2px}
.panel .fld input[type=text],.panel .fld select,.panel .fld textarea{width:100%;border:1px solid #ddd;border-radius:3px;padding:4px 6px;font-size:12px;font-family:inherit}
.panel .fld input[type=range]{width:100%;accent-color:#666}
.panel .fld-row{display:flex;align-items:center;gap:4px}
.panel .fld-row .sl-v{font-size:10px;color:#999;min-width:30px;text-align:right}

/* ═══ BOTTOM SHEET HANDLE (모바일용, 데스크톱 숨김) ═══ */
.sheet-handle{display:none}
.sheet-close{display:none}
/* ═══ OVERLAY ═══ */
.sheet-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:190;opacity:0;transition:opacity .25s}
.sheet-overlay.open{display:block;opacity:1}

/* ═══ ACCORDION ═══ */
.acc-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:8px 12px;border-bottom:1px solid #eee;background:#fafafa;-webkit-tap-highlight-color:transparent}
.acc-head:hover{background:#f5f5f5}
.acc-head h4{margin:0;font-size:11px;color:#555}
.acc-head .arr{font-size:10px;color:#aaa;transition:transform .2s}
.acc-head.open .arr{transform:rotate(180deg)}
.acc-body{display:none;padding:10px 12px;border-bottom:1px solid #eee}
.acc-body.open{display:block}

/* ═══ PRESET BUTTONS ═══ */
.preset-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.preset-btn{border:1px solid #ddd;background:#f8f8f8;border-radius:4px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap;color:#555;-webkit-tap-highlight-color:transparent}
.preset-btn:hover{background:#eef;border-color:#bbc}
.preset-btn:active{background:#ddf}

/* ═══ ITEM LIST ═══ */
.item-list{max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:3px;margin-top:4px;-webkit-overflow-scrolling:touch}
.item-row{display:flex;align-items:center;gap:3px;padding:3px 4px;font-size:10px;border-bottom:1px solid #f5f5f5}
.item-row:last-child{border-bottom:none}
.item-row:nth-child(odd){background:#fafafa}
.item-row .item-n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-row .item-a{color:#1a73e8;font-weight:600;min-width:55px;text-align:right;font-size:9.5px}
.item-row .item-cat{font-size:8px;color:#aaa;min-width:24px;text-align:center}
.item-row .item-del{cursor:pointer;color:#ccc;font-size:14px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.item-row .item-del:active{color:#e33}
.item-add-row{display:flex;gap:3px;margin-top:4px}
.item-add-row input,.item-add-row select{font-size:11px;font-family:inherit;border:1px solid #ddd;border-radius:3px;padding:4px 5px}
.item-add-row input{flex:1;min-width:0}
.item-add-row select{width:60px}
.btn-xs{border:1px solid #ccc;background:#fff;border-radius:3px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn-xs:active{background:#eee}

/* ═══ PREVIEW ═══ */
.preview-area{flex:1;padding:16px;overflow:auto;display:flex;justify-content:center;align-items:flex-start;background:#ebedf0;-webkit-overflow-scrolling:touch}
.preview-scaler{transform-origin:top center;transition:transform .15s}
.preview-wrap{background:#fff;box-shadow:0 1px 8px rgba(0,0,0,.1);position:relative}
.preview-wrap.vertical{width:640px}
.preview-wrap.horizontal{width:1024px}
.wm-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:10}
.page-divider{border:none;border-top:1.5px dashed #ccc;margin:20px 0;position:relative}
.page-divider::after{content:'─ 페이지 나눔 ─';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#fff;padding:0 10px;font-size:9px;color:#bbb;white-space:nowrap}

/* ═══ DOC ═══ */
.doc{padding:24px 20px;font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:11px;line-height:1.55;color:#333;position:relative;z-index:1}
.doc table{width:100%;border-collapse:collapse;margin-bottom:2px}
.doc th,.doc td{padding:5px 7px;text-align:left;font-size:11px;vertical-align:middle}
.doc th{font-weight:600;font-size:10.5px}
.doc .amt{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.doc .logo-block{margin-bottom:12px}
.doc .logo-block .co-name{font-size:15px;font-weight:700;letter-spacing:.5px}
.doc .logo-block .co-sub{font-size:9px;color:#aaa;margin-top:1px}
.doc .sec-title{font-size:12px;font-weight:700;margin:10px 0 6px;padding:4px 0}
.doc .planner-row{font-size:9.5px;color:#888;text-align:right;margin-top:8px;line-height:1.6}
.doc .pg-num{text-align:right;font-size:9px;color:#ccc;margin-bottom:2px}
.doc [contenteditable=true]:hover{outline:1px dashed rgba(0,0,0,.12);outline-offset:1px}
.doc [contenteditable=true]:focus{outline:1.5px solid rgba(0,120,255,.35);outline-offset:1px;background:rgba(255,255,200,.15)}
.card-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.card-item{border:1px solid #ddd;border-radius:3px;padding:6px 8px;flex:1 1 calc(50% - 6px);min-width:160px;font-size:10.5px;display:flex;justify-content:space-between;align-items:center}

/* ═══════════════════════════════════════
   TABLET (768px ~ 1024px)
   ═══════════════════════════════════════ */
@media (min-width:768px) and (max-width:1024px){
  .panel{width:210px}
  .panel .fld input[type=text],.panel .fld select{font-size:11px;padding:3px 5px}
  .topbar label{font-size:10px}
  .topbar select{min-width:90px;font-size:10px;padding:3px 4px}
  .tb-btn{width:30px;height:30px;font-size:13px}
  .item-list{max-height:160px}
}

/* ═══════════════════════════════════════
   MOBILE (< 768px)
   ═══════════════════════════════════════ */
@media (max-width:767px){
  body{background:#f5f5f5}

  /* ── Topbar 모바일 ── */
  .topbar{padding:4px 8px;gap:6px;min-height:44px}
  .topbar select{min-width:0;flex:1;font-size:12px;padding:6px 4px}
  .tb-desktop{display:none}
  .tb-mobile{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .hamburger{display:flex}

  /* ── 메인 레이아웃 ── */
  .main{flex-direction:column;min-height:calc(100vh - 44px)}

  /* ── 패널 → 바텀시트 ── */
  .panel{
    position:fixed;bottom:0;left:0;right:0;width:100%!important;
    height:65vh;max-height:65vh;
    border-right:none;border-top:1px solid #ddd;
    border-radius:14px 14px 0 0;
    transform:translateY(100%);
    transition:transform .3s cubic-bezier(.32,.72,.0,1);
    z-index:200;
    box-shadow:0 -4px 20px rgba(0,0,0,.12);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .panel.open{transform:translateY(0)}
  .sheet-handle{
    display:flex;align-items:center;justify-content:center;
    padding:8px 0 4px;position:sticky;top:0;background:#fff;z-index:1;
    cursor:grab;-webkit-tap-highlight-color:transparent;
    border-radius:14px 14px 0 0;
  }
  .sheet-handle .grip{width:36px;height:4px;background:#ccc;border-radius:2px}
  .sheet-close{
    display:flex;position:absolute;top:8px;right:12px;
    width:28px;height:28px;align-items:center;justify-content:center;
    font-size:18px;color:#999;cursor:pointer;z-index:2;
    border-radius:50%;background:#f0f0f0;
    -webkit-tap-highlight-color:transparent;
  }
  .sheet-close:active{background:#e0e0e0}

  /* ── 프리뷰 영역 모바일 ── */
  .preview-area{
    flex:1;padding:8px;overflow:auto;
    -webkit-overflow-scrolling:touch;
    align-items:flex-start;justify-content:flex-start;
  }
  .preview-scaler{transform-origin:top left}
  .preview-wrap.vertical{width:640px}
  .preview-wrap.horizontal{width:1024px}

  /* 터치 최적화 */
  .preset-btn{padding:6px 10px;font-size:11px}
  .item-row{padding:5px 6px;font-size:11px}
  .item-row .item-del{width:28px;height:28px;font-size:16px}
  .item-add-row input,.item-add-row select{padding:6px;font-size:12px}
  .btn-xs{padding:6px 10px;font-size:12px}
  .panel .fld input[type=text],.panel .fld select{padding:6px;font-size:13px}
  .panel .sec{padding:10px 14px}
  .acc-head{padding:10px 14px}
  .acc-body{padding:10px 14px}
}

/* ═══ PRINT ═══ */
@media print{
  .topbar,.panel,.no-print,.sheet-overlay,.mob-menu{display:none!important}
  .main{display:block}
  .preview-area{padding:0;display:block;background:#fff}
  .preview-scaler{transform:none!important}
  .preview-wrap{box-shadow:none;width:100%!important}
  .doc{padding:8mm 10mm}
  .page-divider{page-break-before:always;border:none;margin:0;padding:0}
  .page-divider::after{display:none}
  .doc [contenteditable=true]:hover,.doc [contenteditable=true]:focus{outline:none;background:none}
}
</style>
</head>
<body>

<!-- ═══════ TOPBAR ═══════ -->
<div class="topbar">
  <!-- 모바일: 보험사 + 뱃지 + 햄버거 -->
  <div class="tb-mobile">
    <select id="selCoMob" onchange="syncCo('mob')"></select>
    <span id="typeBadgeMob" class="type-badge"></span>
  </div>
  <div class="hamburger" onclick="toggleMobMenu()" aria-label="메뉴">☰</div>

  <!-- 데스크톱: 풀 컨트롤 -->
  <div class="tb-desktop">
    <label>보험사</label>
    <select id="selCo" onchange="syncCo('desk')"></select>
    <span id="typeBadge" class="type-badge"></span>
    <label>패턴</label>
    <select id="selPat" onchange="render()"></select>
  </div>
  <div class="tb-spacer"></div>
  <div class="tb-btn tb-desktop" data-tip="PNG" onclick="expPNG()">📷</div>
  <div class="tb-btn tb-desktop" data-tip="PDF" onclick="expPDF()">📄</div>
  <div class="tb-btn tb-desktop" data-tip="인쇄" onclick="window.print()">🖨</div>
</div>

<!-- 모바일 드롭다운 메뉴 -->
<div class="mob-menu" id="mobMenu">
  <div class="mob-menu-item" style="padding:8px 14px">
    <span class="mm-icon">📑</span>
    <select id="selPatMob" onchange="syncPat('mob');closeMobMenu()" style="flex:1;padding:6px;font-size:13px;border:1px solid #ddd;border-radius:3px;font-family:inherit"></select>
  </div>
  <div class="mob-menu-sep"></div>
  <div class="mob-menu-item" onclick="expPNG();closeMobMenu()"><span class="mm-icon">📷</span>PNG 다운로드</div>
  <div class="mob-menu-item" onclick="expPDF();closeMobMenu()"><span class="mm-icon">📄</span>PDF 다운로드</div>
  <div class="mob-menu-item" onclick="window.print();closeMobMenu()"><span class="mm-icon">🖨</span>인쇄</div>
  <div class="mob-menu-sep"></div>
  <div class="mob-menu-item" onclick="openSheet();closeMobMenu()"><span class="mm-icon">⚙️</span>설정 패널 열기</div>
</div>

<!-- 바텀시트 오버레이 -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

<!-- ═══════ MAIN ═══════ -->
<div class="main">
  <div class="panel no-print" id="panelSheet">
    <!-- 모바일 바텀시트 핸들 + 닫기 -->
    <div class="sheet-handle" id="sheetHandle"><div class="grip"></div></div>
    <div class="sheet-close" onclick="closeSheet()">✕</div>

    <!-- ── 설계사 정보 ── -->
    <div class="sec">
      <h4>👤 설계사 정보</h4>
      <div class="fld">
        <label>설계사명</label>
        <input type="text" id="inpPlanner" placeholder="홍길동" oninput="render()">
      </div>
      <div class="fld">
        <label>연락처</label>
        <input type="text" id="inpPhone" placeholder="010-1234-5678" oninput="render()">
      </div>
      <div class="fld">
        <label>상품명 <span style="color:#bbb">(생보형만)</span></label>
        <input type="text" id="inpProduct" placeholder="무배당 건강보험" oninput="render()">
      </div>
    </div>

    <!-- ── 특약 관리 ── -->
    <div class="sec">
      <h4>📋 특약 관리 <span style="font-weight:400;color:#aaa;font-size:10px" id="itemCount"></span></h4>
      <div style="font-size:10px;color:#888;margin-bottom:4px">프리셋 (원클릭 추가)</div>
      <div class="preset-row" id="presetRow"></div>
      <div class="item-list" id="itemList"></div>
      <div class="item-add-row" style="margin-top:5px">
        <input type="text" id="addName" placeholder="보장명">
        <input type="text" id="addAmt" placeholder="금액" style="width:60px">
        <select id="addCat"></select>
        <button class="btn-xs" onclick="addItem()">+</button>
      </div>
    </div>

    <!-- ── ⚙️ 설정 ── -->
    <div class="acc-head" onclick="toggleAcc('accDisplay')">
      <h4>⚙️ 표시 설정</h4><span class="arr">▼</span>
    </div>
    <div class="acc-body" id="accDisplay">
      <div class="fld">
        <label>컬러 농도</label>
        <div class="fld-row">
          <input type="range" id="rngInt" min="0" max="100" value="30" oninput="onSlider()" style="flex:1">
          <span class="sl-v" id="intVal">30%</span>
        </div>
      </div>
      <div class="fld">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="chkBW" onchange="onBW()" style="accent-color:#666"> 흑백 모드
        </label>
      </div>
      <div class="fld">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="chkLogo" checked onchange="render()" style="accent-color:#666"> 로고 표시
        </label>
      </div>
      <div class="fld">
        <label>로고 위치</label>
        <div class="fld-row" style="gap:8px">
          <label style="font-size:11px;cursor:pointer"><input type="radio" name="logoPos" value="left" onchange="render()" style="accent-color:#666"> 좌측</label>
          <label style="font-size:11px;cursor:pointer"><input type="radio" name="logoPos" value="center" checked onchange="render()" style="accent-color:#666"> 중앙</label>
          <label style="font-size:11px;cursor:pointer"><input type="radio" name="logoPos" value="right" onchange="render()" style="accent-color:#666"> 우측</label>
        </div>
      </div>
      <div class="fld">
        <label>방향</label>
        <select id="selDir" onchange="render()">
          <option value="vertical">세로 640</option>
          <option value="horizontal">가로 1024</option>
        </select>
      </div>
    </div>

    <!-- ── 워터마크 ── -->
    <div class="acc-head" onclick="toggleAcc('accWM')">
      <h4>💧 워터마크</h4><span class="arr">▼</span>
    </div>
    <div class="acc-body" id="accWM">
      <div class="fld">
        <label>텍스트</label>
        <input type="text" id="inpWmText" placeholder="김설계사 전용" oninput="renderWM()">
      </div>
      <div class="fld">
        <label>이미지 (20MB, png/jpg)</label>
        <input type="file" id="inpWmImg" accept="image/png,image/jpeg" style="font-size:11px;padding:3px" onchange="onWmImg(this)">
        <div id="wmImgPreview" style="font-size:9px;color:#999;margin-top:2px"></div>
      </div>
      <div class="fld">
        <label>농도</label>
        <div class="fld-row">
          <input type="range" id="rngWmOp" min="0" max="100" value="15" oninput="renderWM()" style="flex:1">
          <span class="sl-v" id="wmOpVal">15%</span>
        </div>
      </div>
      <div class="fld">
        <label>텍스트 크기</label>
        <div class="fld-row">
          <input type="range" id="rngWmSize" min="20" max="120" value="48" oninput="renderWM()" style="flex:1">
          <span class="sl-v" id="wmSzVal">48px</span>
        </div>
      </div>
      <div class="fld"><button class="btn-xs" onclick="clearWM()">초기화</button></div>
    </div>

    <div style="padding:10px 12px;font-size:9.5px;color:#bbb;line-height:1.6">
      텍스트/금액 클릭 편집 · 프리셋 원클릭 · 자동 페이지 분할 · 워터마크 PNG/PDF 포함
    </div>
  </div>

  <!-- ═══ PREVIEW ═══ -->
  <div class="preview-area" id="previewArea">
    <div class="preview-scaler" id="previewScaler">
      <div class="preview-wrap vertical" id="previewWrap">
        <div class="wm-layer" id="wmLayer"></div>

/* ═══════════════════════════════════════════════════════════════

function isMobile(){return window.innerWidth<768}

// ── 모바일 햄버거 메뉴 ──
function toggleMobMenu(){document.getElementById('mobMenu').classList.toggle('open')}
function closeMobMenu(){document.getElementById('mobMenu').classList.remove('open')}
document.addEventListener('click',e=>{
  const menu=document.getElementById('mobMenu');
  if(menu.classList.contains('open')&&!menu.contains(e.target)&&!e.target.closest('.hamburger'))closeMobMenu();
});

// ── 바텀시트 ──
function openSheet(){
  document.getElementById('panelSheet').classList.add('open');
  document.getElementById('sheetOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('panelSheet').classList.remove('open');
  document.getElementById('sheetOverlay').classList.remove('open');
  document.body.style.overflow='';
}

// ── 바텀시트 드래그 핸들 (터치) ──
(function(){
  const handle=document.getElementById('sheetHandle');
  const panel=document.getElementById('panelSheet');
  let startY=0,startTranslate=0,dragging=false;
  handle.addEventListener('touchstart',e=>{
    dragging=true;startY=e.touches[0].clientY;
    const rect=panel.getBoundingClientRect();
    startTranslate=window.innerHeight-rect.top;
    panel.style.transition='none';
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>0){panel.style.transform=`translateY(${dy}px)`}
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    panel.style.transition='';
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>80){closeSheet();panel.style.transform=''}
    else{panel.style.transform='';if(panel.classList.contains('open'))panel.style.transform='translateY(0)'}
  });
})();

// ── 보험사/패턴 동기화 (데스크톱 ↔ 모바일) ──

/* ═══════════════════════════════════════════════════════════════
   SCALE — 미리보기 축소 (화면에 맞게)
   ═══════════════════════════════════════════════════════════════ */
function calcScale(){
  const area=document.getElementById('previewArea');
  const wrap=document.getElementById('previewWrap');
  const scaler=document.getElementById('previewScaler');
  const docW=wrap.classList.contains('horizontal')?1024:640;
  const areaW=area.clientWidth-(isMobile()?16:32);
  const s=Math.min(1,areaW/docW);
  scaler.style.transform=`scale(${s})`;
  // 축소 시 scaler 높이 보정 (레이아웃 깨짐 방지)
  requestAnimationFrame(()=>{
    const realH=wrap.offsetHeight*s;
    scaler.style.height=realH+'px';
  });
}
let scaleTimer;
window.addEventListener('resize',()=>{clearTimeout(scaleTimer);scaleTimer=setTimeout(calcScale,80)});

function hex2rgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function rgb2hex(r,g,b){return'#'+[r,g,b].map(x=>Math.min(255,Math.max(0,Math.round(x))).toString(16).padStart(2,'0')).join('')}
function tint(hex,ratio){const c=hex2rgb(hex);return rgb2hex(255-(255-c.r)*ratio,255-(255-c.g)*ratio,255-(255-c.b)*ratio)}

function render(){
  const pat=document.getElementById('selPat').value;
  const coK=document.getElementById('selCo').value;
  const co=CO[coK];const c=getC();
  const items=currentItems;

  const dir=document.getElementById('selDir').value;
  const lp=getLogoPos();

  const wrap=document.getElementById('previewWrap');
  wrap.className='preview-wrap '+dir;

  const ppg=getPPG();
  const pages=[];
  for(let i=0;i<items.length;i+=ppg)pages.push(items.slice(i,i+ppg));
  if(!pages.length)pages.push([]);

  const gen={A:patA,B:patB,C:patC,D:patD,E:patE,G:patG,H:patH,I:patI,J:patJ,K:patK}[pat];
  let html='';
  pages.forEach((pg,idx)=>{
    if(idx>0)html+='<hr class="page-divider">';
    html+=gen(coK,co,c,pg,pl,ph,prod,logo,idx,pages.length,lp);
  });
  document.getElementById('docRoot').innerHTML='<div class="doc">'+html+'</div>';
  renderWM();
  // 모바일 패턴 sync

  [document.getElementById('selPat'),document.getElementById('selPatMob')].forEach(sel=>{
    const prev=sel.value;sel.innerHTML='';
    pats.forEach(p=>{const o=document.createElement('option');o.value=p.v;o.textContent=p.t;sel.appendChild(o)});
    if(pats.find(p=>p.v===prev))sel.value=prev;
  });
}
function updateTypeBadge(){
  const t=getType();
  [document.getElementById('typeBadge'),document.getElementById('typeBadgeMob')].forEach(b=>{
    b.className='type-badge '+(t==='생명'?'life':'nonlife');b.textContent=t==='생명'?'생보형':'손보형';
  });
}
function onCoChange(){
  // sync both selects
  document.getElementById('selCoMob').value=document.getElementById('selCo').value;
  updatePatternDropdown();updateTypeBadge();resetItems();
}

/* ═══ EXPORT (원본 크기 캡처 — 스케일 리셋) ═══ */
async function capture(){
  const scaler=document.getElementById('previewScaler');
  const wrap=document.getElementById('previewWrap');
  // 캡처 전 스케일 리셋 → 원본 640px/1024px 크기로 캡처
  const origT=scaler.style.transform;
  const origH=scaler.style.height;
  scaler.style.transform='scale(1)';
  scaler.style.height='auto';
  wrap.querySelectorAll('[contenteditable]').forEach(e=>{e.style.outline='none';e.style.background='none'});
  const cv=await html2canvas(wrap,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:wrap.scrollWidth,height:wrap.scrollHeight});
  // 복원
  scaler.style.transform=origT;
  scaler.style.height=origH;
  calcScale();
  return cv;
}
async function expPNG(){const cv=await capture();const a=document.createElement('a');a.download=`설계서_${document.getElementById('selCo').value}.png`;a.href=cv.toDataURL('image/png');a.click()}
async function expPDF(){
  const cv=await capture();const{jsPDF}=window.jspdf;
  const o=document.getElementById('selDir').value==='horizontal'?'l':'p';
  const pdf=new jsPDF(o,'mm','a4');
  const pw=pdf.internal.pageSize.getWidth(),ph2=pdf.internal.pageSize.getHeight(),m=10;
  const uw=pw-m*2,uh=ph2-m*2,ratio=uw/cv.width,sh=cv.height*ratio;
  if(sh<=uh){pdf.addImage(cv.toDataURL('image/png'),'PNG',m,m,uw,sh)}
  else{const slH=uh/ratio;let y=0,pg=0;while(y<cv.height){if(pg>0)pdf.addPage();const h=Math.min(slH,cv.height-y);const tmp=document.createElement('canvas');tmp.width=cv.width;tmp.height=h;tmp.getContext('2d').drawImage(cv,0,y,cv.width,h,0,0,cv.width,h);pdf.addImage(tmp.toDataURL('image/png'),'PNG',m,m,uw,h*ratio);y+=h;pg++}}
  pdf.save(`설계서_${document.getElementById('selCo').value}.pdf`);
}

/* ═══ EVENT HANDLERS ═══ */
function onSlider(){document.getElementById('intVal').textContent=document.getElementById('rngInt').value+'%';if(parseInt(document.getElementById('rngInt').value)>0)document.getElementById('chkBW').checked=false;render()}
function onBW(){if(document.getElementById('chkBW').checked){document.getElementById('rngInt').value=0;document.getElementById('intVal').textContent='0%'}render()}

  [document.getElementById('selCo'),document.getElementById('selCoMob')].forEach(sel=>{

  updatePatternDropdown();updateTypeBadge();resetItems();
